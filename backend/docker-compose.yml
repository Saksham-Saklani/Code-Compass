services:
  postgres:
    image: postgres:18

    container_name: code-compass-database

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: code_compass

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql

  qdrant:
    image: qdrant/qdrant:latest
    container_name: code-compass-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data:
